<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Family Church Assistant</title>
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1.0, user-scalable=no"
  />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background: #050509;
      color: #ffffff;
      min-height: 100vh;
      overscroll-behavior: none;
    }

    .app {
      min-height: 100vh;
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
    }

    .app-header {
      padding: 32px 16px 16px;
      text-align: center;
    }

    .app-header img {
      width: 80px;
      height: 80px;
      object-fit: contain;
      display: block;
      margin: 0 auto 16px;
    }

    .app-title {
      font-size: 22px;
      font-weight: 600;
      text-align: center;
    }

    .hero {
      text-align: center;
      color: #a0a0a7;
      font-size: 18px;
      margin-top: 24px;
    }

    .chat {
      flex: 1;
      padding: 16px;
      padding-bottom: 8px;
      overflow-y: auto;
      scroll-behavior: smooth;
    }

    .message-row {
      display: flex;
      margin-bottom: 10px;
    }

    .message-row.user {
      justify-content: flex-end;
    }

    .message-row.assistant {
      justify-content: flex-start;
    }

    .bubble {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.5;
      word-wrap: break-word;
      white-space: normal;
    }

    .user .bubble {
      background: #0b84ff;
      color: #ffffff;
      border-bottom-right-radius: 4px;
    }

    .assistant .bubble {
      background: #202123;
      color: #ffffff;
      border-bottom-left-radius: 4px;
    }

    .assistant .bubble a {
      color: #7cc7ff;
      text-decoration: underline;
      word-break: break-word;
    }

    .typing-dots {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .typing-dots span {
      width: 6px;
      height: 6px;
      background: #ffffff;
      border-radius: 50%;
      opacity: 0.3;
      animation: blink 1.4s infinite;
    }

    .typing-dots span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .typing-dots span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes blink {
      0% { opacity: 0.3; }
      50% { opacity: 1; }
      100% { opacity: 0.3; }
    }

    .composer {
      position: sticky;
      bottom: 0;
      padding: 12px 12px calc(12px + env(safe-area-inset-bottom));
      background: linear-gradient(to top, #050509, rgba(5, 5, 9, 0.9), transparent);
    }

    .composer-inner {
      display: flex;
      align-items: center;
      background: #1e1f23;
      border-radius: 9999px;
      border: 1px solid #2f3137;
      padding: 12px 14px;
      gap: 10px;
    }

    textarea#message-input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      color: #ffffff;
      font-size: 16px;
      line-height: 1.4;
      resize: none;
      max-height: 120px;
      padding: 0;
    }

    textarea#message-input::placeholder {
      color: #7d7f86;
    }

    #send-btn {
      flex-shrink: 0;
      border: none;
      border-radius: 9999px;
      width: 38px;
      height: 38px;
      background: #0b84ff;
      color: #ffffff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    #send-btn:disabled {
      opacity: 0.6;
      cursor: default;
    }

    @media (min-width: 768px) {
      .composer-inner {
        max-width: 720px;
        margin: 0 auto;
      }

      .chat {
        padding-inline: 40px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="app-header">
      <div class="app-title">Family Church Assistant</div>
      <div id="hero" class="hero">Ask about ministries, campuses, service times, or sermons.</div>
    </header>

    <main id="chat" class="chat"></main>

    <div class="composer">
      <form id="chat-form">
        <div class="composer-inner">
          <textarea
            id="message-input"
            rows="1"
            placeholder="Ask anything..."
          ></textarea>
          <button id="send-btn" type="submit">➤</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const chatEl = document.getElementById("chat");
    const form = document.getElementById("chat-form");
    const input = document.getElementById("message-input");
    const hero = document.getElementById("hero");
    const sendBtn = document.getElementById("send-btn");

    function autoResize() {
      input.style.height = "auto";
      input.style.height = input.scrollHeight + "px";
    }

    input.addEventListener("input", autoResize);

    function escapeHtml(str) {
      return str
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function linkifyText(text) {
      const escaped = escapeHtml(text);

      return escaped
        .replace(
          /(https?:\/\/[^\s<]+)/g,
          '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>'
        )
        .replace(/\n/g, "<br>");
    }

    function addMessage(text, role, opts = {}) {
      if (hero && hero.style.display !== "none") {
        hero.style.display = "none";
      }

      const row = document.createElement("div");
      row.className = `message-row ${role}`;

      const bubble = document.createElement("div");
      bubble.className = "bubble";

      if (opts.typing) {
        bubble.innerHTML = `
          <div class="typing-dots">
            <span></span><span></span><span></span>
          </div>
        `;
      } else {
        bubble.innerHTML = linkifyText(text);
      }

      row.appendChild(bubble);
      chatEl.appendChild(row);
      chatEl.scrollTop = chatEl.scrollHeight;

      return row;
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const message = input.value.trim();
      if (!message) return;

      addMessage(message, "user");
      input.value = "";
      autoResize();
      sendBtn.disabled = true;

      const typingRow = addMessage("", "assistant", { typing: true });

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message })
        });

        const data = await res.json();
        chatEl.removeChild(typingRow);

        if (!res.ok) {
          console.error("API error:", data);
          addMessage(
            data.error ? `Error: ${data.error}` : "Something went wrong.",
            "assistant"
          );
        } else {
          addMessage(
            data.reply || "Sorry, I couldn't generate a response.",
            "assistant"
          );
        }
      } catch (err) {
        console.error(err);
        chatEl.removeChild(typingRow);
        addMessage("Something went wrong. Please try again.", "assistant");
      } finally {
        sendBtn.disabled = false;
      }
    });

    autoResize();
  </script>
</body>
</html>
